        position: Undergraduate Researcher
        location: Tehran, Iran
        start_date: 2016-08
        end_date: 2018-02
        summary: "Designed a parameterized synthesis technique for self-stabilizing algorithms in symmetric networks, developing tight cutoffs that guarantee closure within legitimate states and deadlock-freedom outside them."

