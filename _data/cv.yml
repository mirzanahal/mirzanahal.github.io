        location: Tehran, Iran
        start_date: 2019-09
        end_date: 2022-02
        summary: "Used the RxRx19a dataset (high-throughput five-channel fluorescent microscopy images) to estimate hit scores of drug–dose combinations against SARS-CoV-2. Extracted cellular morphological features at the single-cell level, aggregated them into treatment-level profiles, and developed a scoring algorithm reflecting antiviral efficacy."

